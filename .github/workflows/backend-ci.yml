name: Backend CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - '../../backend/src/**'
      - '../../backend/pom.xml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - '../../backend/src/**'
      - '../../backend/pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Check code style
        run: mvn checkstyle:check
        continue-on-error: true
